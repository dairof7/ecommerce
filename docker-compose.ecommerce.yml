# docker-compose.yml
version: '3.8'

services:
  # --- SERVICIOS DE BASE DE DATOS Y MENSAJERÃA ---
  db:
    image: postgres:15-alpine
    container_name: ecommerce-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - app-network
    restart: unless-stopped

  redis: # <-- NUEVO SERVICIO
    image: redis:7-alpine
    container_name: ecommerce-redis
    # Si usas contraseÃąa en Redis, descomenta y ajÃšstala
    # command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    networks:
      - app-network
    restart: unless-stopped

  # --- SERVICIOS DE APLICACIÃN ---
  backend:
    build:
      context: ./backend
    container_name: ecommerce-backend
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    environment:
      - SERVICE_TYPE=backend
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Variables para Celery
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      # Variables de la tienda
      - SHOP_COMPANY_NAME=${SHOP_COMPANY_NAME}
      - SHOP_COMPANY_NIT=${SHOP_COMPANY_NIT}
      - SHOP_SELLER_NAME=${SHOP_SELLER_NAME}
      - SHOP_SELLER_ID=${SHOP_SELLER_ID}
      - SHOP_ADDRESS=${SHOP_ADDRESS}
      - SHOP_PHONE=${SHOP_PHONE}
      - SHOP_EMAIL=${SHOP_EMAIL}
      - SHOP_LOGO_URL=${SHOP_LOGO_URL}
      # Variables de correo
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      - db
      - redis # <-- El backend ahora depende de redis tambiÃĐn
    command: gunicorn ecommerce.wsgi:application --bind 0.0.0.0:8000 --workers 3 --log-level info --access-logfile - --error-logfile -
    networks:
      - app-network
    restart: unless-stopped

  celery_worker: # <-- NUEVO SERVICIO
    build:
      context: ./backend # Usa la misma imagen que el backend
    container_name: ecommerce-celery-worker
    volumes:
      - media_volume:/app/mediafiles # Si las tareas necesitan acceder a archivos (ej. generar PDFs de facturas)
    environment:
      - SERVICE_TYPE=celery_worker
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      # Todas las demÃĄs variables de entorno que tu lÃģgica de Django/Celery necesite
      - SHOP_COMPANY_NAME=${SHOP_COMPANY_NAME}
      - SHOP_EMAIL=${SHOP_EMAIL}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      # etc...
    command: celery -A ecommerce worker -l info
    depends_on:
      - redis
      - db
    networks:
      - app-network
    restart: unless-stopped

  # --- SERVICIOS DE FRONTEND Y PROXY INVERSO ---
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: ecommerce-frontend
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/srv/www/staticfiles
      - media_volume:/srv/www/mediafiles
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge