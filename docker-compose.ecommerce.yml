# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecommerce-db # Nombre explícito del contenedor
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432" # Host:Container - Para acceso externo opcional
    networks:
      - app-network
    restart: unless-stopped # Para que se reinicie si se cae, a menos que se pare manualmente

  backend:
    build:
      context: ./backend # Ruta a tu proyecto Django
    container_name: ecommerce-backend
    volumes:
      # En producción, idealmente no montarías el código fuente así.
      # La imagen ya debería contener el código.
      # Pero para pruebas donde podrías querer hacer cambios rápidos sin reconstruir, puede ser útil.
      # Si es un despliegue más "fijo", comenta la siguiente línea:
      # - ./backend:/app 
      - static_volume:/app/staticfiles # Django escribe aquí con collectstatic
      - media_volume:/app/mediafiles   # Django escribe aquí los archivos subidos
    expose: # Solo accesible por otros contenedores en la misma red
      - "8000"
    environment:
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS} # ej. localhost,127.0.0.1,tu_dominio.com
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend # Ruta a tu proyecto React
      args:
        # Esta variable se pasa al Dockerfile del frontend durante la build.
        # Si el Nginx principal va a rutear /api al backend, y el frontend está en la raíz,
        # el frontend puede hacer llamadas a /api/... y Nginx lo manejará.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api} 
    container_name: ecommerce-frontend
    expose: # El Nginx dentro de este contenedor escucha en el puerto 80
      - "80"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine # Usamos la imagen oficial
    container_name: ecommerce-nginx
    ports:
      - "80:80"   # Escucha en el puerto 80 del host y lo redirige al 80 del contenedor
      - "443:443" # Para HTTPS más adelante
    volumes:
      # Monta tu configuración personalizada de Nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
      - ./nginx/conf.d:/etc/nginx/conf.d:ro # Directorio para configuraciones de virtual hosts
      # Volúmenes para servir archivos estáticos y multimedia de Django directamente
      - static_volume:/srv/www/staticfiles # Nginx accederá a los estáticos de Django desde aquí
      - media_volume:/srv/www/mediafiles   # Nginx accederá a los media de Django desde aquí
      # Para SSL con Let's Encrypt (Certbot) - descomentar cuando se configure
      # - certbot_conf:/etc/letsencrypt
      # - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend # Nginx principal ahora depende de ambos servicios
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
  # certbot_conf:
  # certbot_www:

networks:
  app-network:
    driver: bridge