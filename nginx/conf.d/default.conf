# ./nginx/conf.d/default.conf

upstream django_server {
    # Nombre del servicio backend en docker-compose y su puerto expuesto INTERNAMENTE
    server backend:8000;
}

# Opcional: si el frontend tiene su propio Nginx en un contenedor
# upstream frontend_server {
#    server frontend:80; 
# }

server {
    listen 80;
    server_name solidstore.duckdns.org 149.130.191.216 localhost; # Dominios que escuchará

    # Para Let's Encrypt (Certbot) - validación ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/backend/staticfiles/; # Ruta DENTRO del contenedor Nginx donde montaste static_volume
    }

    location /media/ {
        alias /app/backend/mediafiles/;   # Ruta DENTRO del contenedor Nginx donde montaste media_volume
    }

    location /api/ { # Todas las solicitudes a /api/ van al backend Django
        proxy_pass http://django_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        # Para WebSockets si los usaras (no relevante ahora)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    location / { # El resto de las solicitudes sirven el frontend React
        # Opción 1: Si Nginx sirve los archivos del frontend directamente
        root /usr/share/nginx/html/frontend; # Ruta DENTRO del contenedor Nginx donde montaste el build del frontend
        try_files $uri $uri/ /index.html;    # Importante para Single Page Applications (SPA) como React

        # Opción 2: Si el frontend tiene su propio servidor Nginx en un contenedor
        # proxy_pass http://frontend_server;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header Host $host;
        # proxy_redirect off;
    }

    # Manejo de errores (opcional)
    # error_page 500 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /usr/share/nginx/html;
    # }
}

