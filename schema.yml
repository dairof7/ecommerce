          readOnly: true
      required:
      - cart
      - created_at
      - id
      - total
    StatusEnum:
      enum:
      - pending
      - paid
      - cancelled
      - shipped
      type: string
      description: |-
        * `pending` - Pending
        * `paid` - Paid
        * `cancelled` - Cancelled
        * `shipped` - Shipped
    StockEntry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        purchase_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        date:
          type: string
          format: date-time
          readOnly: true
        notes:
          type: string
        product:
          type: integer
      required:
      - date
      - id
      - product
      - purchase_price
      - quantity
    Subcategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        category:
          type: integer
      required:
      - category
      - id
      - name
    Tag:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
      required:
      - id
      - name
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - id
      - password
      - username
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
        address:
          type: string
          maxLength: 255
        document:
          type: string
          maxLength: 20
        phone:
          type: string
          maxLength: 20
      required:
      - id
      - user
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
